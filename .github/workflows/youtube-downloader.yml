name: YouTube Video Downloader

on:
  push:
    paths:
      - 'commands.txt'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Set up Node.js (for PO token generation)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Create directories
      run: |
        mkdir -p downloads results
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytubefix youtube-search-python nodejs-wheel-binaries
    
    - name: Process commands
      run: python downloader.py
      env:
        PO_TOKEN: ${{ secrets.PO_TOKEN }}
        VISITOR_DATA: ${{ secrets.VISITOR_DATA }}
    
    - name: Save PO Token if generated
      run: |
        if [ -f po_token.txt ]; then
          echo "PO Token generated"
        fi
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: youtube-downloads
        path: |
          downloads/
          results/
    
    - name: Commit files to repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add downloads/ results/ commands.txt
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "⬇️ Processed YouTube commands [skip ci]"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
